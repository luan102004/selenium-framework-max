# Bài 6: Pipeline đầy đủ — Matrix + Allure publish GitHub Pages
# FIX từ file gốc:
#   - Thêm fail-fast: false
#   - Thêm secrets env cho APP_USERNAME/APP_PASSWORD
#   - Thêm suiteXmlFile tham số đúng
#   - Thêm upload allure-results artifact
#   - Thêm job publish-report để deploy Allure lên GitHub Pages
#   - Thêm schedule cron và workflow_dispatch
name: Full Selenium CI Pipeline

on:
  push:
    branches: [ main, feature/vpbank-payment ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 1-5'
  workflow_dispatch:

jobs:
  # ── Job 1: Chạy test song song 2 browser ──
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, firefox]
      fail-fast: false  # FIX: thiếu trong file gốc

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven  # FIX: thiếu trong file gốc

      - name: Chạy test (${{ matrix.browser }})
        # FIX: file gốc dùng `mvn clean test` không có -Dbrowser, -DsuiteXmlFile
        run: mvn clean test -Dbrowser=${{ matrix.browser }} -Denv=dev -DsuiteXmlFile=src/test/resources/testng-smoke.xml
        env:
          # FIX: file gốc thiếu hoàn toàn env secrets → NullPointerException
          APP_USERNAME: ${{ secrets.SAUCEDEMO_USERNAME }}
          APP_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}

      - name: Upload Allure results — ${{ matrix.browser }}
        if: always()  # FIX: file gốc thiếu bước upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: target/allure-results/

  # ── Job 2: Publish Allure Report lên GitHub Pages ──
  # FIX: file gốc hoàn toàn thiếu job này — mvn allure:report không publish được
  publish-report:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Chrome results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-chrome
          path: allure-results/

      - name: Download Firefox results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-firefox
          path: allure-results/

      - name: Tạo và Publish Allure lên GitHub Pages
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
